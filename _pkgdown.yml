title: ineqx
url: https://benrosche.github.io/ineqx/

template:
  bootstrap: 5
  bslib:
    # Page styling
    bg: "#ffffff"          # white background
    fg: "#222222"          # main text color
    primary: "#008b94"     # dark teal accent color (links, buttons)

    # Navbar styling
    navbar-bg: "#141b2d"   # exact dark menu background
    navbar-fg: "#ffffff"   # navbar text/icons
    navbar-hover-color: "#008b94"
    navbar-brand-color: "#ffffff"
    navbar-brand-hover-color: "#008b94"

    # Link styling
    link-color: "#008b94"

  params:
    ganalytics: UA-56931813-1

navbar:
  type: dark
  left:
    - icon: fa-home
      href: index.html
      aria-label: Home
    - text: "Model structure"
      href: articles/model.html
    - text: "Package installation"
      href: articles/installation.html
    - text: "Package functions"
      href: reference/index.html
    - text: "Examples"
      href: articles/examples.html
  right:
    - text: "news"
      href: news/index.html
    - text: "faq"
      href: articles/faq.html
    - icon: fab fa-github
      href: https://github.com/benrosche/ineqx/
      aria-label: GitHub

reference:
  - title: "Main entry points"
    desc: "Unified function for descriptive and causal variance decomposition."
    contents:
      - ineqx
      - ineqx_params
  - title: "Standard errors"
    desc: "Bootstrap configuration; delta-method SEs are computed automatically inside ineqx()."
    contents:
      - boot_config
      - bootstrap_params
      - decompose_boot_params
  - title: "Comparing scenarios"
    contents:
      - compare
  - title: "Plotting & theme"
    contents:
      - starts_with("plot.")
      - theme_ineqx
  - title: "Print & summary"
    contents:
      - starts_with("print.")
      - starts_with("summary.")
  - title: "Datasets"
    contents:
      - cps_sample
      - incdat
  - title: "Shiny demo"
    contents:
      - runShinyExample
  - title: internal
    contents:
      - matches(".*")

articles:
  - title: "Get started"
    contents:
      - installation
      - tutorial
  - title: "Reference"
    contents:
      - model
      - examples
      - split-step-workflow
      - faq
